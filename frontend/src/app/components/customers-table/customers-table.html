<section class="rounded-2xl border border-gray-200 bg-white shadow-sm">
  <p-table
    [value]="customers()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '58rem' }"
    [rowHover]="true"
    [scrollable]="true"
    dataKey="id"
  >
    <ng-template pTemplate="header">
      <tr>
        <th class="w-[60px] text-center">
          <input
            type="checkbox"
            class="h-4 w-4 cursor-pointer accent-pink-600"
            [checked]="allVisibleSelected()"
            (click)="$event.stopPropagation()"
            (change)="onHeaderCheckboxChange($event)"
          />
        </th>

        <th class="overflow-hidden text-ellipsis whitespace-nowrap">
          <button
            type="button"
            class="inline-flex items-center gap-2 font-semibold text-white-800 transition hover:text-pink-600"
            (click)="onSortClick('firstName')"
          >
            <span>Ime</span>
            <i [class]="getSortIconFn()('firstName')"></i>
          </button>
        </th>

        <th>Email</th>
        <th>Grad</th>
        <th>Država</th>
        <th>Status</th>
        <th class="w-[180px] text-center">Akcije</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-customer>
      <tr
        class="cursor-pointer transition-colors"
        (click)="onRowClicked(customer)"
      >
        <td class="text-center" (click)="$event.stopPropagation()">
          <input
            type="checkbox"
            class="h-4 w-4 cursor-pointer accent-pink-600"
            [checked]="isSelected(customer.id)"
            [disabled]="!customer.isActive"
            (change)="onRowCheckboxChange(customer.id, $event)"
          />
        </td>

        <td class="text-gray-100">
          {{ customer.firstName + ' ' + customer.lastName }}
        </td>

        <td class="text-gray-100">{{ customer.email }}</td>

        <td>{{ customer.city }}</td>
        <td>{{ customer.country }}</td>

        <td>
          <p-tag
            [value]="customer.isActive ? 'Aktivan' : 'Neaktivan'"
            [severity]="customer.isActive ? 'success' : 'danger'"
          ></p-tag>
        </td>

        <td class="text-center" (click)="$event.stopPropagation()">
          <div class="flex justify-center gap-2">
            <p-button
              type="button"
              icon="pi pi-eye"
              severity="info"
              rounded="true"
              (click)="onEyeClick(customer, $event)"
            ></p-button>

            <p-button
              type="button"
              icon="pi pi-ban"
              severity="danger"
              rounded="true"
              [disabled]="!customer.isActive"
              [loading]="isActionLoadingFn()(customer.id)"
              (click)="onDeactivateClick(customer, $event)"
            ></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="py-10 text-center text-sm text-gray-500">
          Nema kupaca za prikaz.
        </td>
      </tr>
    </ng-template>
  </p-table>

  <footer
    class="flex flex-wrap items-center justify-between gap-3 border-t border-gray-600 px-4 py-4"
  >
    <p class="text-sm text-gray-900">
      Označeno:
      <span class="font-semibold text-gray-900">{{ selectedCount() }}</span>
    </p>

    <p-paginator
      [first]="first()"
      [rows]="pageSize()"
      [totalRecords]="totalCount()"
      [rowsPerPageOptions]="pageSizeOptions()"
      (onPageChange)="onPageChanged($event)"
    ></p-paginator>
  </footer>
</section>
